{% extends 'master/base.html' %}

{% block c %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="page-title">Calory List</h1>

    <a href="{% url 'add_calorie' %}" class="btn btn-primary">
        Add Calory
    </a>
</div>

<div class="glass-card p-4">

    <table class="table table-hover align-middle">

        <thead>
            <tr>
                <th>Sl</th>
                <th>Item Name</th>
                <th>Consume Calory</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>

            {% for data in consumed_data %}

            <tr>
                <td>{{forloop.counter}}</td>

                <td class="fw-bold">
                    {{data.item_name}}
                </td>

                <td>
                    {{data.calorie}} kcal
                </td>

                <td>
                    <a href="{% url 'update_calory' data.id %}" class="btn btn-sm btn-warning">
                        Edit
                    </a>

                    <a href="{% url 'delete_calory' data.id %}" class="btn btn-sm btn-danger">
                        Delete
                    </a>
                </td>
            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock c %}
